<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Painel visualizar</title>
    <link rel="stylesheet" href="/static/login.css" />
  </head>
  <body>
    <main class="login-page">
      <div class="login-stack">
        <img
          alt="Prefeitura de Amargosa"
          class="login-logo"
          src="/assets/logo-prefeitura-horizontal-login.png"
        />

        <section class="login-head">
          <h1 class="login-title">Painel visualizar</h1>
        </section>

        <form id="loginForm" class="login-card">
          <label class="field">
            <span>E-mail</span>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="username"
              placeholder="seu@empresa.com"
              required
            />
          </label>

          <label class="field">
            <span>Senha</span>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder="********"
              required
            />
          </label>

          <p id="loginMessage" class="login-message" role="alert"></p>

          <button id="submitButton" class="login-button" type="submit">Entrar</button>
        </form>
      </div>

      <footer class="login-footer">
        <div class="login-footer-logos">
          <img
            alt="GTI"
            class="login-footer-logo login-footer-logo-gti"
            src="/assets/logo-gti-login.png"
          />
          <span aria-hidden="true" class="login-footer-divider"></span>
          <img
            alt="Immanuel Vicente"
            class="login-footer-logo login-footer-logo-immanuel"
            src="/assets/logo-immanuel-login.png"
          />
        </div>
      </footer>
    </main>

    <script src="/static/login.js"></script>
  </body>
</html>
