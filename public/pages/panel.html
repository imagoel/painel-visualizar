<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel de Sistemas</title>
    <link rel="stylesheet" href="/static/panel.css" />
  </head>
  <body>
    <header class="panel-topbar">
      <div class="panel-actions">
        <button id="editViewButton" class="ghost-button" type="button">Editar visualização</button>
        <button id="logoutButton" class="ghost-button" type="button">Sair</button>
      </div>
    </header>

    <main class="panel-shell">
      <div id="stage" class="tv-stage"></div>
      <div id="dots" class="tv-dots"></div>
      <div id="progress" class="tv-progress"></div>
    </main>

    <div id="visualizationModal" class="visualization-modal is-hidden" role="dialog" aria-modal="true">
      <section class="visualization-dialog">
        <div class="visualization-header">
          <h2>Editar visualização</h2>
          <button id="closeVisualizationButton" class="icon-button" type="button" aria-label="Fechar">&times;</button>
        </div>

        <div id="visualizationOptions" class="visualization-options"></div>

        <p id="visualizationMessage" class="visualization-message" role="alert"></p>

        <div class="visualization-actions">
          <button id="cancelVisualizationButton" class="secondary-button" type="button">Cancelar</button>
          <button id="applyVisualizationButton" class="primary-button" type="button">Aplicar</button>
        </div>
      </section>
    </div>

    <script src="/static/panel.js"></script>
  </body>
</html>
